components:
  parameters:
    ProjectSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Project slug

    FlagKey:
      name: key
      in: path
      required: true
      schema:
        type: string
      description: Flag key

    EnvSlug:
      name: env
      in: path
      required: true
      schema:
        type: string
      description: Environment slug

    SessionID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Testing session ID

    WebhookID:
      name: webhook_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Webhook ID

    PluginSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Plugin slug

    MarketplaceSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
      description: Marketplace listing slug

    IntegrationProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
        enum:
          - mixpanel
          - customer_io
          - amplitude
          - segment
          - datadog
          - slack
      description: Integration provider name

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
