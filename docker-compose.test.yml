services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: flagbridge_test
      POSTGRES_PASSWORD: flagbridge_test
      POSTGRES_DB: flagbridge_test
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagbridge_test"]
      interval: 3s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
