services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://flagbridge:flagbridge@postgres:5432/flagbridge?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    image: ghcr.io/flagbridge/admin:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_URL_INTERNAL=http://api:8080
    depends_on:
      - api

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=flagbridge
      - POSTGRES_PASSWORD=flagbridge
      - POSTGRES_DB=flagbridge
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flagbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
